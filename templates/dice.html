<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miranda Games — Dice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0c0c0c;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 16px 32px;
    }

    .top-bar {
      width: 100%; max-width: 420px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .top-bar h1 { font-size: 1.15rem; font-weight: 700; }
    .top-bar a  { font-size: .78rem; color: #555; text-decoration: none; }

    /* ── Name prompt ─────────────────────────────────────────────────────── */
    #name-screen {
      background: #1a1a1a; border-radius: 16px;
      padding: 32px 28px; width: 100%; max-width: 340px;
      text-align: center; margin-top: 40px;
    }
    #name-screen h2 { margin-bottom: 16px; font-size: 1.1rem; }
    #name-input {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 2px solid #333; background: #111; color: white;
      font-size: 1rem; margin-bottom: 14px; outline: none; text-align: center;
    }
    #name-input:focus { border-color: #e94560; }
    #name-btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: #e94560; color: white; font-size: 1rem;
      font-weight: 600; cursor: pointer;
    }

    /* ── Game screen ─────────────────────────────────────────────────────── */
    #game-screen { display: none; width: 100%; max-width: 420px; }
    .player-tag  { font-size: .8rem; color: #555; text-align: center; margin-bottom: 8px; }
    .player-tag strong { color: #e94560; }

    /* ── Game area — the table top viewed from above ─────────────────────── */
    .game-area {
      position: relative;
      width: 100%;
      height: 270px;
      margin-bottom: 18px;
    }

    /* Wooden outer rail */
    .table-rail {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(160deg, #7a4a24 0%, #5c3317 40%, #4a2910 60%, #6b3d1c 100%);
      box-shadow: 0 14px 44px rgba(0,0,0,.75), 0 3px 0 #2e1708,
                  inset 0 1px 0 rgba(255,255,255,.08);
    }

    /* Green felt — inset from rail */
    .table-felt {
      position: absolute;
      inset: 10px;
      border-radius: 12px;
      background:
        repeating-linear-gradient(45deg,  rgba(255,255,255,.014) 0, rgba(255,255,255,.014) 1px, transparent 1px, transparent 18px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,.014) 0, rgba(255,255,255,.014) 1px, transparent 1px, transparent 18px),
        radial-gradient(ellipse at 50% 50%, #2f9040 0%, #1e6a2c 45%, #155222 100%);
      box-shadow: inset 0 0 60px rgba(0,0,0,.40), inset 0 1px 0 rgba(255,255,255,.05);
    }

    /* ── 3D Die ──────────────────────────────────────────────────────────── */
    .die-scene {
      position: absolute;
      width: 80px; height: 80px;
      perspective: 560px;
      perspective-origin: 50% 50%;
      z-index: 4;
    }

    .die-cube {
      width: 80px; height: 80px;
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .face {
      position: absolute;
      width: 80px; height: 80px;
      border-radius: 13px;
      display: grid;
      grid-template-areas: "a . b" "c e d" "f . g";
      padding: 13px; gap: 7px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: inset -2px -2px 5px rgba(0,0,0,.12), inset 2px 2px 5px rgba(255,255,255,.55);
    }

    /* Directional lighting */
    .face.front  { background: #ffffff; transform: translateZ(40px); }
    .face.back   { background: #d4d4d0; transform: rotateY(180deg) translateZ(40px); }
    .face.right  { background: #eeeeeb; transform: rotateY(90deg)  translateZ(40px); }
    .face.left   { background: #e4e4e0; transform: rotateY(-90deg) translateZ(40px); }
    .face.top    { background: #f6f6f3; transform: rotateX(-90deg) translateZ(40px); }
    .face.bottom { background: #dcdcd8; transform: rotateX(90deg)  translateZ(40px); }

    /* Gloss highlight */
    .face::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(255,255,255,.28) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Pip dots */
    .p {
      display: block; border-radius: 50%; visibility: hidden;
      background: radial-gradient(circle at 35% 30%, #3a3a3a, #0e0e0e);
      box-shadow: 0 1px 3px rgba(0,0,0,.6), inset 0 1px 1px rgba(255,255,255,.06);
    }
    .p.a { grid-area: a; } .p.b { grid-area: b; }
    .p.c { grid-area: c; } .p.d { grid-area: d; }
    .p.e { grid-area: e; } .p.f { grid-area: f; }
    .p.g { grid-area: g; }

    [data-pip="1"] .p.e { visibility: visible; }
    [data-pip="2"] .p.a, [data-pip="2"] .p.g { visibility: visible; }
    [data-pip="3"] .p.a, [data-pip="3"] .p.e, [data-pip="3"] .p.g { visibility: visible; }
    [data-pip="4"] .p.a, [data-pip="4"] .p.b, [data-pip="4"] .p.f, [data-pip="4"] .p.g { visibility: visible; }
    [data-pip="5"] .p.a, [data-pip="5"] .p.b, [data-pip="5"] .p.e, [data-pip="5"] .p.f, [data-pip="5"] .p.g { visibility: visible; }
    [data-pip="6"] .p.a, [data-pip="6"] .p.b, [data-pip="6"] .p.c, [data-pip="6"] .p.d, [data-pip="6"] .p.f, [data-pip="6"] .p.g { visibility: visible; }

    /* Shadow on felt */
    .die-shadow {
      position: absolute;
      height: 14px;
      background: rgba(0,0,0,.55);
      border-radius: 50%;
      filter: blur(6px);
      z-index: 3;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Roll result ─────────────────────────────────────────────────────── */
    .roll-info { text-align: center; min-height: 52px; margin-bottom: 14px; }
    .roll-info .roller { font-size: .78rem; color: #555; margin-bottom: 2px; }
    .roll-info .total  { font-size: 2.3rem; font-weight: 800; color: #e94560; }

    /* ── Roll button ─────────────────────────────────────────────────────── */
    #roll-btn {
      display: block; width: 100%; padding: 17px;
      border-radius: 14px; border: none;
      background: linear-gradient(140deg, #e94560 0%, #b83050 100%);
      color: white; font-size: 1.15rem; font-weight: 700;
      cursor: pointer; margin-bottom: 22px; letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(233,69,96,.4);
      transition: transform .1s, box-shadow .1s;
    }
    #roll-btn:hover   { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(233,69,96,.5); }
    #roll-btn:active  { transform: scale(.97); }
    #roll-btn:disabled { background: #222; color: #444; cursor: not-allowed; box-shadow: none; transform: none; }

    /* ── History ─────────────────────────────────────────────────────────── */
    .history-title {
      font-size: .7rem; font-weight: 600; color: #3a3a3a;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
    }
    .history-list { display: flex; flex-direction: column; gap: 7px; }
    .history-item {
      background: #181818; border-radius: 10px;
      padding: 9px 14px; display: flex;
      justify-content: space-between; align-items: center;
      font-size: .85rem; border-left: 3px solid transparent;
    }
    .history-item.mine { border-left-color: #e94560; }
    .history-item .who  { color: #e94560; font-weight: 600; }
    .history-item .dice { color: #3a3a3a; font-size: .76rem; }
    .history-item .tot  { font-weight: 800; font-size: 1rem; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>🎲 Dice Roller</h1>
  <a href="/">← All Games</a>
</div>

<!-- Name prompt -->
<div id="name-screen">
  <h2>What's your name?</h2>
  <input type="text" id="name-input" placeholder="Enter your name" maxlength="20" />
  <button id="name-btn" onclick="saveName()">Let's Play</button>
</div>

<!-- Game -->
<div id="game-screen">
  <div class="player-tag">Playing as <strong id="player-display"></strong></div>

  <div class="game-area" id="game-area">
    <div class="table-rail"></div>
    <div class="table-felt"></div>

    <!-- Die 1 -->
    <div class="die-scene" id="scene1">
      <div class="die-cube" id="cube1">
        <div class="face front"  data-pip="1"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face back"   data-pip="6"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face right"  data-pip="3"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face left"   data-pip="4"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face top"    data-pip="2"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face bottom" data-pip="5"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
      </div>
    </div>

    <!-- Die 2 -->
    <div class="die-scene" id="scene2">
      <div class="die-cube" id="cube2">
        <div class="face front"  data-pip="1"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face back"   data-pip="6"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face right"  data-pip="3"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face left"   data-pip="4"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face top"    data-pip="2"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
        <div class="face bottom" data-pip="5"><span class="p a"></span><span class="p b"></span><span class="p c"></span><span class="p e"></span><span class="p d"></span><span class="p f"></span><span class="p g"></span></div>
      </div>
    </div>

    <div class="die-shadow" id="shadow1"></div>
    <div class="die-shadow" id="shadow2"></div>
  </div>

  <div class="roll-info">
    <div class="roller" id="roller-name"></div>
    <div class="total"  id="roll-total"></div>
  </div>

  <button id="roll-btn" onclick="rollDice()">🎲 &nbsp; R O L L</button>

  <div class="history-title">Roll History</div>
  <div class="history-list" id="history-list"></div>
</div>

<script>
  const CUBE = 80;
  const HALF = CUBE / 2;

  // Face layout: front=1, back=6, right=3, left=4, top=2, bottom=5
  const FACE_ROT = {
    1: [  0,   0, 0],
    2: [ 90,   0, 0],
    3: [  0, -90, 0],
    4: [  0,  90, 0],
    5: [-90,   0, 0],
    6: [  0, 180, 0],
  };

  // Shortest-path angle snap
  function snap(cur, tgt) {
    const c = ((cur % 360) + 360) % 360;
    const t = ((tgt % 360) + 360) % 360;
    let d = t - c;
    if (d >  180) d -= 360;
    if (d < -180) d += 360;
    return cur + d;
  }

  let playerName    = '';
  let lastRollId    = 0;
  let pollTimer     = null;
  let animating     = false;
  let pendingResult = null;

  const gameArea = () => document.getElementById('game-area');
  const areaW    = () => gameArea().clientWidth;
  const areaH    = () => gameArea().clientHeight;

  // Random landing position within the felt, ensuring the two dice
  // stay in separate halves so they don't overlap.
  function randomLand(side) {
    const w = areaW(), h = areaH();
    const pad = HALF + 18;   // keep dice off the rail
    const midX = w / 2;
    const cx = side === 'left'
      ? pad + Math.random() * (midX - pad - HALF - 10)
      : midX + HALF + 10 + Math.random() * (midX - pad - HALF - 10);
    const cy = pad + Math.random() * (h - 2 * pad);
    return { cx, cy };
  }

  // ── Name ──────────────────────────────────────────────────────────────────
  function saveName() {
    const v = document.getElementById('name-input').value.trim();
    if (!v) { document.getElementById('name-input').focus(); return; }
    playerName = v;
    localStorage.setItem('dice_player', v);
    document.getElementById('name-screen').style.display  = 'none';
    document.getElementById('game-screen').style.display  = 'block';
    document.getElementById('player-display').textContent = v;
    placeDiceDefault();
    fetchLatest();
    startPolling();
  }

  function placeDiceDefault() {
    const w = areaW(), h = areaH();
    placeSceneAt('scene1', 'shadow1', w * 0.27, h * 0.5, 1);
    placeSceneAt('scene2', 'shadow2', w * 0.67, h * 0.5, 1);
  }

  function placeSceneAt(sceneId, shadowId, cx, cy, scale) {
    const scene = document.getElementById(sceneId);
    scene.style.left = (cx - HALF) + 'px';
    scene.style.top  = (cy - HALF) + 'px';
    const cube = scene.querySelector('.die-cube');
    cube.style.transition = 'none';
    cube.style.transform  = `scale(${scale}) rotateX(0deg) rotateY(0deg) rotateZ(0deg)`;
    updateShadow(shadowId, cx, cy, scale);
  }

  function updateShadow(id, cx, cy, scale) {
    const el = document.getElementById(id);
    const w  = CUBE * scale * 0.88;
    el.style.width   = w + 'px';
    el.style.height  = '14px';
    el.style.opacity = scale * 0.5;
    el.style.left    = (cx - w / 2) + 'px';
    el.style.top     = (cy + HALF * scale - 2) + 'px';
  }

  // ── Top-down drop animation ────────────────────────────────────────────────
  // The die starts tiny at its final X,Y and grows as it "falls" toward the felt.
  function launchDie(sceneId, shadowId, cx, cy, delay, getVal, onDone) {
    setTimeout(() => {
      const scene = document.getElementById(sceneId);
      const cube  = scene.querySelector('.die-cube');

      scene.style.left = (cx - HALF) + 'px';
      scene.style.top  = (cy - HALF) + 'px';
      cube.style.transition = 'none';

      let scale = 0.04;
      let vScale = 0.002;          // velocity — accelerates each frame (gravity)

      let rx = Math.random() * 360;
      let ry = Math.random() * 360;
      let rz = Math.random() * 360;
      const rSign = () => (Math.random() > 0.5 ? 1 : -1);
      let sx = rSign() * (5 + Math.random() * 5);
      let sy = rSign() * (6 + Math.random() * 6);
      let sz = rSign() * (2 + Math.random() * 3);

      function tick() {
        vScale += 0.0016;  // accelerate (gravity)
        scale  += vScale;
        rx += sx; ry += sy; rz += sz;

        const s = Math.min(scale, 1.0);
        cube.style.transform = `scale(${s}) rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;
        updateShadow(shadowId, cx, cy, s);

        if (scale >= 1.0) {
          doBounce(cube, shadowId, cx, cy, rx, ry, rz, sx, sy, sz, getVal, onDone);
          return;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }, delay);
  }

  // Brief bounce on impact, then settle to correct face
  function doBounce(cube, shadowId, cx, cy, rx, ry, rz, sx, sy, sz, getVal, onDone) {
    // Slow the spin on impact
    sx *= 0.25; sy *= 0.25; sz *= 0.25;

    let scale     = 1.0;
    let vScale    = -0.06;     // bounce up (scale decreases momentarily)
    let bouncing  = true;
    let bounceCount = 0;

    function bounceTick() {
      if (bouncing) {
        vScale += 0.006;      // gravity pulls it back down
        scale  += vScale;
        rx += sx; ry += sy; rz += sz;

        if (scale <= 0.88 || (scale >= 1.0 && vScale > 0 && bounceCount === 0)) {
          bounceCount++;
        }
        if (scale >= 1.0 && vScale > 0) {
          scale   = 1.0;
          vScale  = -vScale * 0.3;  // small second bounce
          sx *= 0.4; sy *= 0.4; sz *= 0.4;
          bounceCount++;
        }
        if (bounceCount >= 2 && Math.abs(vScale) < 0.015) {
          bouncing = false;
        }

        const s = Math.max(0.6, Math.min(1.0, scale));
        cube.style.transform = `scale(${s}) rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;
        updateShadow(shadowId, cx, cy, s);
        requestAnimationFrame(bounceTick);
      } else {
        doSettle(cube, shadowId, cx, cy, rx, ry, rz, getVal, onDone);
      }
    }
    requestAnimationFrame(bounceTick);
  }

  function doSettle(cube, shadowId, cx, cy, rx, ry, rz, getVal, onDone) {
    const val = getVal();
    if (!val) {
      setTimeout(() => doSettle(cube, shadowId, cx, cy, rx, ry, rz, getVal, onDone), 60);
      return;
    }

    const [tx, ty] = FACE_ROT[val];
    const fx = snap(rx, tx);
    const fy = snap(ry, ty);
    const fz = snap(rz, 0);

    cube.style.transition = 'transform 0.25s ease-out';
    cube.style.transform  = `scale(1) rotateX(${fx}deg) rotateY(${fy}deg) rotateZ(${fz}deg)`;
    updateShadow(shadowId, cx, cy, 1);

    setTimeout(onDone, 400);
  }

  // ── Roll ──────────────────────────────────────────────────────────────────
  async function rollDice() {
    if (animating) return;
    animating     = true;
    pendingResult = null;

    document.getElementById('roll-btn').disabled       = true;
    document.getElementById('roller-name').textContent = '';
    document.getElementById('roll-total').textContent  = '';

    // Pick random landing spots — die 1 left half, die 2 right half
    const land1 = randomLand('left');
    const land2 = randomLand('right');

    fetch('/api/dice/roll', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({player_name: playerName})
    }).then(r => r.json()).then(d => { pendingResult = d; });

    let settled = 0;
    function onSettled() {
      settled++;
      if (settled < 2) return;
      animating = false;
      document.getElementById('roll-btn').disabled = false;
      if (pendingResult) {
        document.getElementById('roller-name').textContent = pendingResult.player_name + ' rolled';
        document.getElementById('roll-total').textContent  = pendingResult.total;
        lastRollId = pendingResult.id;
      }
      fetchLatest();
    }

    launchDie('scene1', 'shadow1', land1.cx, land1.cy, 0,
      () => pendingResult ? pendingResult.die1 : null,
      onSettled
    );

    launchDie('scene2', 'shadow2', land2.cx, land2.cy,
      80 + Math.floor(Math.random() * 80),
      () => pendingResult ? pendingResult.die2 : null,
      onSettled
    );
  }

  // ── Poll & history ─────────────────────────────────────────────────────────
  function applyRoll(data) {
    if (animating) return;
    const doSnap = (cubeId, val) => {
      const [tx, ty] = FACE_ROT[val];
      const c = document.getElementById(cubeId).querySelector('.die-cube');
      c.style.transition = 'transform 0.35s ease-out';
      c.style.transform  = `scale(1) rotateX(${tx}deg) rotateY(${ty}deg) rotateZ(0deg)`;
    };
    doSnap('scene1', data.die1);
    doSnap('scene2', data.die2);
    document.getElementById('roller-name').textContent = data.player_name + ' rolled';
    document.getElementById('roll-total').textContent  = data.die1 + data.die2;
    lastRollId = data.id;
  }

  function renderHistory(history) {
    document.getElementById('history-list').innerHTML = history.map(r => {
      const mine = r.player_name === playerName ? 'mine' : '';
      const time = new Date(r.rolled_at + 'Z').toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
      return `<div class="history-item ${mine}">
        <span class="who">${esc(r.player_name)}</span>
        <span class="dice">${r.die1} + ${r.die2} &nbsp;·&nbsp; ${time}</span>
        <span class="tot">${r.die1 + r.die2}</span>
      </div>`;
    }).join('');
  }

  async function fetchLatest() {
    const res  = await fetch(`/api/dice/latest?since_id=${lastRollId}`);
    const data = await res.json();
    if (data.new_roll && data.latest) applyRoll(data.latest);
    else if (data.latest && lastRollId === 0) applyRoll(data.latest);
    if (data.history) renderHistory(data.history);
  }

  function startPolling() {
    clearInterval(pollTimer);
    pollTimer = setInterval(fetchLatest, 2000);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('dice_player');
    if (saved) document.getElementById('name-input').value = saved;
    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveName();
    });
  });
</script>
</body>
</html>
