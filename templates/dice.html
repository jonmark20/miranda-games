<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miranda Games — Dice</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0c0c0c; color: #f0f0f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 18px 16px 32px;
    }
    .top-bar {
      width: 100%; max-width: 440px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .top-bar h1 { font-size: 1.15rem; font-weight: 700; }
    .top-bar a  { font-size: .78rem; color: #555; text-decoration: none; }

    #name-screen {
      background: #1a1a1a; border-radius: 16px;
      padding: 32px 28px; width: 100%; max-width: 340px;
      text-align: center; margin-top: 40px;
    }
    #name-screen h2 { margin-bottom: 16px; font-size: 1.1rem; }
    #name-input {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 2px solid #333; background: #111; color: white;
      font-size: 1rem; margin-bottom: 14px; outline: none; text-align: center;
    }
    #name-input:focus { border-color: #e94560; }
    #name-btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: #e94560; color: white; font-size: 1rem;
      font-weight: 600; cursor: pointer;
    }

    #game-screen { display: none; width: 100%; max-width: 440px; }
    .player-tag  { font-size: .8rem; color: #555; text-align: center; margin-bottom: 8px; }
    .player-tag strong { color: #e94560; }

    /* Three.js canvas lives here */
    #canvas-wrap {
      width: 100%; border-radius: 18px; overflow: hidden;
      margin-bottom: 18px;
      box-shadow: 0 16px 48px rgba(0,0,0,.7);
    }
    #dice-canvas { display: block; width: 100%; }

    .roll-info { text-align: center; min-height: 52px; margin-bottom: 14px; }
    .roll-info .roller { font-size: .78rem; color: #555; margin-bottom: 2px; }
    .roll-info .total  { font-size: 2.3rem; font-weight: 800; color: #e94560; }

    #roll-btn {
      display: block; width: 100%; padding: 17px;
      border-radius: 14px; border: none;
      background: linear-gradient(140deg, #e94560 0%, #b83050 100%);
      color: white; font-size: 1.15rem; font-weight: 700;
      cursor: pointer; margin-bottom: 22px; letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(233,69,96,.4);
      transition: transform .1s, box-shadow .1s;
    }
    #roll-btn:hover   { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(233,69,96,.5); }
    #roll-btn:active  { transform: scale(.97); }
    #roll-btn:disabled { background: #222; color: #444; cursor: not-allowed; box-shadow: none; transform: none; }

    .history-title {
      font-size: .7rem; font-weight: 600; color: #3a3a3a;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
    }
    .history-list { display: flex; flex-direction: column; gap: 7px; }
    .history-item {
      background: #181818; border-radius: 10px;
      padding: 9px 14px; display: flex;
      justify-content: space-between; align-items: center;
      font-size: .85rem; border-left: 3px solid transparent;
    }
    .history-item.mine { border-left-color: #e94560; }
    .history-item .who  { color: #e94560; font-weight: 600; }
    .history-item .dice { color: #3a3a3a; font-size: .76rem; }
    .history-item .tot  { font-weight: 800; font-size: 1rem; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>🎲 Dice Roller</h1>
  <a href="/">← All Games</a>
</div>

<div id="name-screen">
  <h2>What's your name?</h2>
  <input type="text" id="name-input" placeholder="Enter your name" maxlength="20" />
  <button id="name-btn" onclick="saveName()">Let's Play</button>
</div>

<div id="game-screen">
  <div class="player-tag">Playing as <strong id="player-display"></strong></div>

  <div id="canvas-wrap">
    <canvas id="dice-canvas"></canvas>
  </div>

  <div class="roll-info">
    <div class="roller" id="roller-name"></div>
    <div class="total"  id="roll-total"></div>
  </div>

  <button id="roll-btn" onclick="rollDice()">🎲 &nbsp; R O L L</button>

  <div class="history-title">Roll History</div>
  <div class="history-list" id="history-list"></div>
</div>

<script>
// ── Three.js scene ─────────────────────────────────────────────────────────
const TABLE_W = 9.2, TABLE_D = 5.6, TABLE_H = 0.22;
const RAIL_W  = 0.55, RAIL_H = 0.38;
const DIE_SZ  = 1.0;
const LAND_Y  = TABLE_H / 2 + DIE_SZ / 2;   // die rests on table top
const START_Y = 4.5;                           // drop from here (within camera view)

let scene, camera, renderer, die1, die2;

// Die physics state
function makeDieState(mesh) {
  return {
    mesh, state: 'idle',    // idle | falling | bouncing | settling | resting
    vy: 0, rx: 0, ry: 0, rz: 0,
    bounces: 0, settleTarget: null,
    slerpStart: null, slerpEnd: null, slerpT: 0,
    onDone: null,
  };
}
let ds1, ds2;

// BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z
// Die values assigned: right(+X)=3, left(-X)=4, top(+Y)=2, bottom(-Y)=5, front(+Z)=1, back(-Z)=6
// To show value V on top (+Y), rotate so that face's normal → +Y:
const FACE_UP_EULER = {
  1: [-Math.PI / 2, 0, 0],   // +Z→up
  2: [0,            0, 0],   // +Y already up
  3: [0,            0,  Math.PI / 2],  // +X→up
  4: [0,            0, -Math.PI / 2],  // -X→up
  5: [Math.PI,      0, 0],   // -Y→up
  6: [ Math.PI / 2, 0, 0],   // -Z→up
};

function getTargetQuat(value) {
  const [ex, , ez] = FACE_UP_EULER[value];
  // Random Y spin (doesn't change which face is up)
  const yAngle = (Math.floor(Math.random() * 4) * Math.PI) / 2;
  return new THREE.Quaternion().setFromEuler(new THREE.Euler(ex, yAngle, ez));
}

// ── Canvas textures for each pip value ────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function makeFaceTex(value) {
  const SZ = 256, r = 24;
  const c  = document.createElement('canvas');
  c.width  = c.height = SZ;
  const ctx = c.getContext('2d');

  // Ivory face with rounded corners
  const bg = ctx.createLinearGradient(0, 0, SZ, SZ);
  bg.addColorStop(0, '#f8f8f2');
  bg.addColorStop(1, '#eeeee8');
  roundRect(ctx, 0, 0, SZ, SZ, r);
  ctx.fillStyle = bg;
  ctx.fill();

  // Gloss sheen
  const shine = ctx.createLinearGradient(0, 0, SZ * 0.7, SZ * 0.7);
  shine.addColorStop(0, 'rgba(255,255,255,0.38)');
  shine.addColorStop(1, 'rgba(255,255,255,0)');
  roundRect(ctx, 0, 0, SZ, SZ, r);
  ctx.fillStyle = shine;
  ctx.fill();

  // Pips
  const pip_r = SZ * 0.082;
  const PIPS = {
    1: [[.5, .5]],
    2: [[.25, .25], [.75, .75]],
    3: [[.25, .25], [.5,  .5 ], [.75, .75]],
    4: [[.25, .25], [.75, .25], [.25, .75], [.75, .75]],
    5: [[.25, .25], [.75, .25], [.5,  .5 ], [.25, .75], [.75, .75]],
    6: [[.25, .22], [.75, .22], [.25, .5 ], [.75, .5 ], [.25, .78], [.75, .78]],
  };
  for (const [nx, ny] of PIPS[value]) {
    const px = nx * SZ, py = ny * SZ;
    // Soft drop shadow
    ctx.beginPath(); ctx.arc(px + 1.5, py + 2.5, pip_r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fill();
    // Pip with radial gradient for depth
    const g = ctx.createRadialGradient(px - pip_r * 0.35, py - pip_r * 0.35, 0, px, py, pip_r);
    g.addColorStop(0, '#3a3a3a'); g.addColorStop(1, '#0a0a0a');
    ctx.beginPath(); ctx.arc(px, py, pip_r, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
  }

  return new THREE.CanvasTexture(c);
}

// ── Build the scene ────────────────────────────────────────────────────────
function initThree() {
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth;
  const H = Math.round(W * 0.72);   // taller viewport shows more of the table

  scene    = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  scene.fog = new THREE.Fog(0x111111, 18, 30);

  camera   = new THREE.PerspectiveCamera(44, W / H, 0.1, 60);
  camera.position.set(0, 10, 3.5);
  camera.lookAt(0, 0, 0);

  const canvas = document.getElementById('dice-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H, false);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  // ── Lighting ──────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xfff5e0, 0.55));

  const sun = new THREE.DirectionalLight(0xfff8ee, 1.1);
  sun.position.set(4, 12, 6);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 26;
  sun.shadow.camera.left = -6; sun.shadow.camera.right = 6;
  sun.shadow.camera.top =  5; sun.shadow.camera.bottom = -5;
  sun.shadow.bias = -0.001;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0xb0d4ff, 0.28);
  fill.position.set(-6, 8, -4);
  scene.add(fill);

  // ── Table ─────────────────────────────────────────────────────────────
  const feltMat = new THREE.MeshStandardMaterial({
    color: 0x1c7030, roughness: 0.92, metalness: 0.0,
  });
  const felt = new THREE.Mesh(new THREE.BoxGeometry(TABLE_W, TABLE_H, TABLE_D), feltMat);
  felt.receiveShadow = true;
  scene.add(felt);

  const woodMat = new THREE.MeshStandardMaterial({
    color: 0x5a3015, roughness: 0.72, metalness: 0.05,
  });
  function addRail(w, d, x, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, RAIL_H, d), woodMat);
    m.position.set(x, (RAIL_H - TABLE_H) / 2, z);
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
  }
  const hw = TABLE_W / 2, hd = TABLE_D / 2;
  addRail(TABLE_W + RAIL_W * 2, RAIL_W,  0,           hd + RAIL_W / 2);   // near
  addRail(TABLE_W + RAIL_W * 2, RAIL_W,  0,          -hd - RAIL_W / 2);   // far
  addRail(RAIL_W,               TABLE_D, -hw - RAIL_W / 2, 0);             // left
  addRail(RAIL_W,               TABLE_D,  hw + RAIL_W / 2, 0);             // right

  // ── Dice ──────────────────────────────────────────────────────────────
  // Material order: [+X=3, -X=4, +Y=2, -Y=5, +Z=1, -Z=6]
  const dieValues = [3, 4, 2, 5, 1, 6];
  function makeDieMesh() {
    const geo  = new THREE.BoxGeometry(DIE_SZ, DIE_SZ, DIE_SZ);
    const mats = dieValues.map(v => new THREE.MeshStandardMaterial({
      map: makeFaceTex(v), roughness: 0.22, metalness: 0.0,
    }));
    const mesh = new THREE.Mesh(geo, mats);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    return mesh;
  }

  die1 = makeDieMesh();
  die2 = makeDieMesh();
  ds1  = makeDieState(die1);
  ds2  = makeDieState(die2);

  // Rest them at default positions
  placeDieResting(ds1, -1.6, 0.2);
  placeDieResting(ds2,  1.6, -0.2);

  // Start render loop
  (function loop() {
    requestAnimationFrame(loop);
    updateDie(ds1);
    updateDie(ds2);
    renderer.render(scene, camera);
  })();
}

function placeDieResting(ds, x, z) {
  ds.mesh.position.set(x, LAND_Y, z);
  ds.mesh.quaternion.setFromEuler(new THREE.Euler(0, Math.PI / 4, 0));
  ds.state = 'resting';
}

// ── Physics update (runs every frame) ─────────────────────────────────────
const GRAVITY = 0.018;

function updateDie(ds) {
  if (ds.state === 'falling') {
    ds.vy      -= GRAVITY;
    ds.mesh.position.y += ds.vy;
    ds.mesh.rotation.x += ds.rx;
    ds.mesh.rotation.y += ds.ry;
    ds.mesh.rotation.z += ds.rz;

    if (ds.mesh.position.y <= LAND_Y) {
      ds.mesh.position.y = LAND_Y;
      ds.bounces++;
      const r = Math.max(0.04, 0.42 - ds.bounces * 0.10);
      ds.vy = Math.abs(ds.vy) * r;
      ds.rx *= 0.45; ds.ry *= 0.45; ds.rz *= 0.45;

      if (ds.vy < 0.025 || ds.bounces >= 5) {
        ds.vy = 0;
        ds.state = 'settling';
        startSettle(ds);
      }
    }
  } else if (ds.state === 'settling') {
    // Slerp to correct face
    ds.slerpT = Math.min(ds.slerpT + 0.04, 1);
    const ease = 1 - Math.pow(1 - ds.slerpT, 3);
    ds.mesh.quaternion.slerpQuaternions(ds.slerpStart, ds.slerpEnd, ease);

    if (ds.slerpT >= 1) {
      ds.state = 'resting';
      if (ds.onDone) { ds.onDone(); ds.onDone = null; }
    }
  }
}

function startSettle(ds) {
  if (!ds.settleTarget) {
    // Value not back yet — keep spinning slowly and retry
    ds.mesh.rotation.x += ds.rx * 0.5;
    ds.mesh.rotation.y += ds.ry * 0.5;
    ds.mesh.rotation.z += ds.rz * 0.5;
    ds.rx *= 0.85; ds.ry *= 0.85; ds.rz *= 0.85;
    setTimeout(() => { if (ds.state === 'settling') startSettle(ds); }, 50);
    return;
  }
  ds.slerpStart = ds.mesh.quaternion.clone();
  ds.slerpEnd   = getTargetQuat(ds.settleTarget);
  ds.slerpT     = 0;
}

function launchDie(ds, x, z, onDone) {
  ds.state        = 'falling';
  ds.vy           = 0;
  ds.bounces      = 0;
  ds.settleTarget = null;
  ds.onDone       = onDone;
  ds.mesh.position.set(x, START_Y, z);
  ds.mesh.rotation.set(
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 2
  );
  const sgn = () => Math.random() > 0.5 ? 1 : -1;
  ds.rx = sgn() * (0.09 + Math.random() * 0.09);
  ds.ry = sgn() * (0.07 + Math.random() * 0.08);
  ds.rz = sgn() * (0.06 + Math.random() * 0.06);
}

// Random position within the table bounds for each side
function randPos(side) {
  // Constrained well inside the visible area so dice never clip the edge
  const xMax = 1.9;
  const zMax = 1.1;
  const x = side === 'L'
    ? -(0.5 + Math.random() * (xMax - 0.5))
    :  (0.5 + Math.random() * (xMax - 0.5));
  const z = (Math.random() * 2 - 1) * zMax;
  return [x, z];
}

// ── App state ──────────────────────────────────────────────────────────────
let playerName    = '';
let lastRollId    = 0;
let pollTimer     = null;
let animating     = false;
let pendingResult = null;

function saveName() {
  const v = document.getElementById('name-input').value.trim();
  if (!v) { document.getElementById('name-input').focus(); return; }
  playerName = v;
  localStorage.setItem('dice_player', v);
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('player-display').textContent = v;
  initThree();
  fetchLatest();
  startPolling();
}

// ── Roll ──────────────────────────────────────────────────────────────────
async function rollDice() {
  if (animating) return;
  animating     = true;
  pendingResult = null;

  document.getElementById('roll-btn').disabled       = true;
  document.getElementById('roller-name').textContent = '';
  document.getElementById('roll-total').textContent  = '';

  const [x1, z1] = randPos('L');
  const [x2, z2] = randPos('R');

  fetch('/api/dice/roll', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({player_name: playerName})
  }).then(r => r.json()).then(d => {
    pendingResult     = d;
    ds1.settleTarget  = d.die1;
    ds2.settleTarget  = d.die2;
  });

  let settled = 0;
  function onSettled() {
    settled++;
    if (settled < 2) return;
    animating = false;
    document.getElementById('roll-btn').disabled = false;
    if (pendingResult) {
      document.getElementById('roller-name').textContent = pendingResult.player_name + ' rolled';
      document.getElementById('roll-total').textContent  = pendingResult.total;
      lastRollId = pendingResult.id;
    }
    fetchLatest();
  }

  launchDie(ds1, x1, z1, onSettled);
  setTimeout(() => launchDie(ds2, x2, z2, onSettled), 80 + Math.random() * 80);
}

// ── Polling ────────────────────────────────────────────────────────────────
function applyRoll(data) {
  if (animating) return;
  const [x1, z1] = randPos('L');
  const [x2, z2] = randPos('R');

  let settled = 0;
  function onSettled() {
    settled++;
    if (settled >= 2) {
      document.getElementById('roller-name').textContent = data.player_name + ' rolled';
      document.getElementById('roll-total').textContent  = data.die1 + data.die2;
    }
  }

  launchDie(ds1, x1, z1, onSettled);
  ds1.settleTarget = data.die1;
  setTimeout(() => {
    launchDie(ds2, x2, z2, onSettled);
    ds2.settleTarget = data.die2;
  }, 80 + Math.random() * 80);

  lastRollId = data.id;
}

function renderHistory(history) {
  document.getElementById('history-list').innerHTML = history.map(r => {
    const mine = r.player_name === playerName ? 'mine' : '';
    const time = new Date(r.rolled_at + 'Z').toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    return `<div class="history-item ${mine}">
      <span class="who">${esc(r.player_name)}</span>
      <span class="dice">${r.die1} + ${r.die2} &nbsp;·&nbsp; ${time}</span>
      <span class="tot">${r.die1 + r.die2}</span>
    </div>`;
  }).join('');
}

async function fetchLatest() {
  const res  = await fetch(`/api/dice/latest?since_id=${lastRollId}`);
  const data = await res.json();
  if (data.new_roll && data.latest) applyRoll(data.latest);
  else if (data.latest && lastRollId === 0) {
    lastRollId = data.latest.id;
    document.getElementById('roller-name').textContent = data.latest.player_name + ' rolled';
    document.getElementById('roll-total').textContent  = data.latest.die1 + data.latest.die2;
    if (ds1) {
      ds1.settleTarget = data.latest.die1;
      ds2.settleTarget = data.latest.die2;
      startSettle(ds1); startSettle(ds2);
    }
  }
  if (data.history) renderHistory(data.history);
}

function startPolling() {
  clearInterval(pollTimer);
  pollTimer = setInterval(fetchLatest, 2000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('dice_player');
  if (saved) document.getElementById('name-input').value = saved;
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveName();
  });
});
</script>
</body>
</html>
