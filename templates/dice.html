<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miranda Games — Dice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
    }

    .top-bar {
      width: 100%; max-width: 420px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .top-bar h1 { font-size: 1.2rem; font-weight: 700; }
    .top-bar a  { font-size: .8rem; color: #555; text-decoration: none; }

    /* ── Name prompt ─────────────────────────────────────────────────────── */
    #name-screen {
      background: #1a1a1a; border-radius: 16px;
      padding: 32px 28px; width: 100%; max-width: 340px; text-align: center;
      margin-top: 40px;
    }
    #name-screen h2 { margin-bottom: 16px; font-size: 1.1rem; }
    #name-input {
      width: 100%; padding: 12px 16px; border-radius: 10px;
      border: 2px solid #333; background: #111; color: white;
      font-size: 1rem; margin-bottom: 14px; outline: none; text-align: center;
    }
    #name-input:focus { border-color: #e94560; }
    #name-btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: #e94560; color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
    }

    /* ── Game screen ─────────────────────────────────────────────────────── */
    #game-screen { display: none; width: 100%; max-width: 420px; }

    .player-tag { font-size: .82rem; color: #666; margin-bottom: 10px; text-align: center; }
    .player-tag strong { color: #e94560; }

    /* ── Game area (above-table zone + table) ────────────────────────────── */
    .game-area {
      position: relative;
      width: 100%;
      height: 380px;  /* 100px above-table + 280px table */
      margin-bottom: 20px;
    }

    /* Wooden rail / edge of table */
    .table-rail {
      position: absolute;
      top: 100px; left: 0; right: 0;
      height: 280px;
      background: #5c3317;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,.7), 0 4px 0 #3d2010;
    }

    /* Green felt */
    .table-felt {
      position: absolute;
      top: 112px; left: 10px; right: 10px;
      height: 256px;
      background:
        repeating-linear-gradient(45deg,  rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 14px),
        repeating-linear-gradient(-45deg, rgba(255,255,255,.012) 0px, rgba(255,255,255,.012) 1px, transparent 1px, transparent 14px),
        radial-gradient(ellipse at 50% 40%, #2e8c3d 0%, #1e6b2a 55%, #165022 100%);
      border-radius: 12px;
      box-shadow: inset 0 0 50px rgba(0,0,0,.35);
    }

    /* Die shadows (on felt surface) */
    .die-shadow {
      position: absolute;
      height: 14px;
      background: rgba(0,0,0,.45);
      border-radius: 50%;
      filter: blur(7px);
      z-index: 2;
      opacity: 0;
      pointer-events: none;
    }

    /* Dice */
    .die {
      position: absolute;
      width: 82px; height: 82px;
      background: #fffffc;
      border-radius: 14px;
      display: grid;
      grid-template-areas: "a . b" "c e d" "f . g";
      padding: 13px; gap: 7px;
      box-shadow: 0 6px 20px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.8);
      z-index: 3;
      will-change: transform;
    }

    .pip {
      width: 100%; aspect-ratio: 1;
      background: #1a1a1a; border-radius: 50%; visibility: hidden;
    }
    .pip.a { grid-area: a; } .pip.b { grid-area: b; }
    .pip.c { grid-area: c; } .pip.d { grid-area: d; }
    .pip.e { grid-area: e; } .pip.f { grid-area: f; }
    .pip.g { grid-area: g; }

    [data-val="1"] .pip.e { visibility: visible; }
    [data-val="2"] .pip.a, [data-val="2"] .pip.g { visibility: visible; }
    [data-val="3"] .pip.a, [data-val="3"] .pip.e, [data-val="3"] .pip.g { visibility: visible; }
    [data-val="4"] .pip.a, [data-val="4"] .pip.b, [data-val="4"] .pip.f, [data-val="4"] .pip.g { visibility: visible; }
    [data-val="5"] .pip.a, [data-val="5"] .pip.b, [data-val="5"] .pip.e, [data-val="5"] .pip.f, [data-val="5"] .pip.g { visibility: visible; }
    [data-val="6"] .pip.a, [data-val="6"] .pip.b, [data-val="6"] .pip.c, [data-val="6"] .pip.d, [data-val="6"] .pip.f, [data-val="6"] .pip.g { visibility: visible; }

    /* ── Roll result ─────────────────────────────────────────────────────── */
    .roll-info { text-align: center; min-height: 50px; margin-bottom: 14px; }
    .roll-info .roller { font-size: .8rem; color: #666; margin-bottom: 2px; }
    .roll-info .total  { font-size: 2.2rem; font-weight: 800; color: #e94560; }

    /* ── Roll button ─────────────────────────────────────────────────────── */
    #roll-btn {
      display: block; width: 100%; padding: 17px;
      border-radius: 14px; border: none;
      background: linear-gradient(135deg, #e94560, #b8304a);
      color: white; font-size: 1.15rem; font-weight: 700;
      cursor: pointer; margin-bottom: 24px; letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(233,69,96,.4);
      transition: transform .1s, box-shadow .1s;
    }
    #roll-btn:hover  { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(233,69,96,.5); }
    #roll-btn:active { transform: scale(.97); }
    #roll-btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; box-shadow: none; transform: none; }

    /* ── History ─────────────────────────────────────────────────────────── */
    .history-title {
      font-size: .72rem; font-weight: 600; color: #444;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
    }
    .history-list { display: flex; flex-direction: column; gap: 7px; }
    .history-item {
      background: #1a1a1a; border-radius: 10px;
      padding: 9px 14px; display: flex;
      justify-content: space-between; align-items: center;
      font-size: .86rem; border-left: 3px solid transparent;
    }
    .history-item.mine { border-left-color: #e94560; }
    .history-item .who  { color: #e94560; font-weight: 600; }
    .history-item .dice { color: #444; font-size: .76rem; }
    .history-item .tot  { font-weight: 800; font-size: 1rem; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>🎲 Dice Roller</h1>
  <a href="/">← All Games</a>
</div>

<!-- Name prompt -->
<div id="name-screen">
  <h2>What's your name?</h2>
  <input type="text" id="name-input" placeholder="Enter your name" maxlength="20" />
  <button id="name-btn" onclick="saveName()">Let's Play</button>
</div>

<!-- Game -->
<div id="game-screen">
  <div class="player-tag">Playing as <strong id="player-display"></strong></div>

  <div class="game-area" id="game-area">
    <div class="table-rail"></div>
    <div class="table-felt"></div>

    <!-- Shadows on felt -->
    <div class="die-shadow" id="shadow1"></div>
    <div class="die-shadow" id="shadow2"></div>

    <!-- Dice -->
    <div class="die" id="die1" data-val="6">
      <div class="pip a"></div><div class="pip b"></div><div class="pip c"></div>
      <div class="pip e"></div><div class="pip d"></div>
      <div class="pip f"></div><div class="pip g"></div>
    </div>
    <div class="die" id="die2" data-val="6">
      <div class="pip a"></div><div class="pip b"></div><div class="pip c"></div>
      <div class="pip e"></div><div class="pip d"></div>
      <div class="pip f"></div><div class="pip g"></div>
    </div>
  </div>

  <div class="roll-info">
    <div class="roller" id="roller-name"></div>
    <div class="total"  id="roll-total"></div>
  </div>

  <button id="roll-btn" onclick="rollDice()">🎲 &nbsp; R O L L</button>

  <div class="history-title">Roll History</div>
  <div class="history-list" id="history-list"></div>
</div>

<script>
  // ── Constants ──────────────────────────────────────────────────────────────
  const DIE_SIZE  = 82;
  const ABOVE     = 100;   // px above-table zone height in .game-area
  const TABLE_H   = 268;   // felt height (game-area height minus above minus rail padding)
  const LAND_Y    = ABOVE + TABLE_H - DIE_SIZE - 14;  // y where die rests on felt

  // ── State ──────────────────────────────────────────────────────────────────
  let playerName    = '';
  let lastRollId    = 0;
  let pollTimer     = null;
  let animating     = false;
  let pendingResult = null;

  // Starting positions for each die (will be set after layout)
  let tableWidth = 380;

  function getTableWidth() {
    return document.getElementById('game-area').clientWidth;
  }

  // ── Name ──────────────────────────────────────────────────────────────────
  function saveName() {
    const val = document.getElementById('name-input').value.trim();
    if (!val) { document.getElementById('name-input').focus(); return; }
    playerName = val;
    localStorage.setItem('dice_player_name', val);
    document.getElementById('name-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('player-display').textContent = val;
    tableWidth = getTableWidth();
    placeDiceResting();
    fetchLatest();
    startPolling();
  }

  // Place dice in resting position without animation (initial state)
  function placeDiceResting() {
    const tw = getTableWidth();
    const d1 = document.getElementById('die1');
    const d2 = document.getElementById('die2');
    d1.style.left = Math.floor(tw * 0.22) + 'px';
    d1.style.top  = LAND_Y + 'px';
    d1.style.transform = 'rotate(0deg)';
    d2.style.left = Math.floor(tw * 0.58) + 'px';
    d2.style.top  = LAND_Y + 'px';
    d2.style.transform = 'rotate(0deg)';
    setShadow('shadow1', Math.floor(tw * 0.22), LAND_Y, 1);
    setShadow('shadow2', Math.floor(tw * 0.58), LAND_Y, 1);
  }

  // ── Physics simulation for one die ────────────────────────────────────────
  function launchDie(dieId, shadowId, startX, landX, delayMs, getVal, onSettled) {
    setTimeout(() => {
      const die    = document.getElementById(dieId);
      const shadow = document.getElementById(shadowId);

      let x  = startX;
      let y  = -DIE_SIZE;       // start just above game-area
      let vy = 1 + Math.random();
      let vx = (landX - startX) * 0.022 + (Math.random() - 0.5) * 0.8;
      let rotation  = Math.random() * 360;
      let rotSpeed  = (Math.random() > 0.5 ? 1 : -1) * (9 + Math.random() * 7);
      let bounces   = 0;
      let frameN    = 0;
      const G       = 0.32;
      const tw      = getTableWidth();
      const minX    = 14;
      const maxX    = tw - DIE_SIZE - 14;

      die.style.transition = 'none';

      function tick() {
        frameN++;
        vy += G;
        y  += vy;
        x  += vx;

        // Wall bounce
        if (x < minX) { x = minX; vx = Math.abs(vx) * 0.5; }
        if (x > maxX) { x = maxX; vx = -Math.abs(vx) * 0.5; }

        // Table surface bounce
        if (y >= LAND_Y) {
          y = LAND_Y;
          bounces++;
          const restitution = Math.max(0.05, 0.42 - bounces * 0.09);
          vy = -Math.abs(vy) * restitution;
          vx *= 0.72;
          rotSpeed *= 0.52;

          // Settle when bouncing is tiny
          if (Math.abs(vy) < 0.7 || bounces >= 4) {
            settle(die, shadow, x, getVal, onSettled);
            return;
          }
        }

        // Update face randomly every 3 frames
        if (frameN % 3 === 0) die.dataset.val = Math.ceil(Math.random() * 6);

        // 3D tilt perspective during fall
        const tiltX = (Math.random() - 0.5) * 28;
        const tiltY = (Math.random() - 0.5) * 28;
        die.style.left      = x + 'px';
        die.style.top       = y + 'px';
        die.style.transform = `perspective(200px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) rotate(${rotation}deg)`;
        rotation += rotSpeed;

        // Shadow: grows as die approaches table
        const height = Math.max(0, LAND_Y - y);
        const proximity = Math.max(0, 1 - height / (LAND_Y + DIE_SIZE));
        setShadow(shadowId, x, LAND_Y, proximity);

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    }, delayMs);
  }

  function settle(die, shadow, x, getVal, onSettled) {
    // Wait for server result if not yet back
    const val = getVal();
    if (val === null) {
      setTimeout(() => settle(die, shadow, x, getVal, onSettled), 60);
      return;
    }

    die.dataset.val = val;
    die.style.transition = 'transform 0.22s cubic-bezier(0.17, 0.67, 0.35, 1.18)';
    die.style.transform  = 'rotate(0deg)';
    setShadow(die.id === 'die1' ? 'shadow1' : 'shadow2', x, LAND_Y, 1);

    setTimeout(onSettled, 280);
  }

  function setShadow(id, dieX, dieY, proximity) {
    const el = document.getElementById(id);
    const w  = Math.max(16, DIE_SIZE * 0.9 * proximity);
    const op = Math.max(0, 0.5 * proximity);
    el.style.width   = w + 'px';
    el.style.opacity = op;
    el.style.left    = (dieX + DIE_SIZE / 2 - w / 2) + 'px';
    el.style.top     = (dieY + DIE_SIZE + 2) + 'px';
  }

  // ── Roll ──────────────────────────────────────────────────────────────────
  async function rollDice() {
    if (animating) return;
    animating     = true;
    pendingResult = null;
    document.getElementById('roll-btn').disabled = true;
    document.getElementById('roller-name').textContent = '';
    document.getElementById('roll-total').textContent  = '';

    const tw = getTableWidth();

    // Fetch result in parallel with animation
    fetch('/api/dice/roll', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({player_name: playerName})
    }).then(r => r.json()).then(d => { pendingResult = d; });

    let settled = 0;
    function checkDone() {
      settled++;
      if (settled === 2) {
        animating = false;
        document.getElementById('roll-btn').disabled = false;
        if (pendingResult) {
          document.getElementById('roller-name').textContent = pendingResult.player_name + ' rolled';
          document.getElementById('roll-total').textContent  = pendingResult.total;
          lastRollId = pendingResult.id;
        }
        fetchLatest();
      }
    }

    // Die 1 — thrown from upper-left area
    launchDie(
      'die1', 'shadow1',
      Math.floor(tw * 0.15),                // startX
      Math.floor(tw * 0.15 + Math.random() * 60),  // landX
      0,                                    // delay: first
      () => pendingResult ? pendingResult.die1 : null,
      checkDone
    );

    // Die 2 — thrown slightly later from upper-right area
    launchDie(
      'die2', 'shadow2',
      Math.floor(tw * 0.65),
      Math.floor(tw * 0.5 + Math.random() * 60),
      110 + Math.floor(Math.random() * 60), // delay: 110–170ms later
      () => pendingResult ? pendingResult.die2 : null,
      checkDone
    );
  }

  // ── Polling & history ─────────────────────────────────────────────────────
  function applyRoll(data) {
    if (animating) return;
    const d1 = document.getElementById('die1');
    const d2 = document.getElementById('die2');
    d1.dataset.val = data.die1;
    d2.dataset.val = data.die2;
    document.getElementById('roller-name').textContent = data.player_name + ' rolled';
    document.getElementById('roll-total').textContent  = data.die1 + data.die2;
    lastRollId = data.id;
  }

  function renderHistory(history) {
    document.getElementById('history-list').innerHTML = history.map(r => {
      const mine = r.player_name === playerName ? 'mine' : '';
      const time = new Date(r.rolled_at + 'Z').toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
      return `<div class="history-item ${mine}">
        <span class="who">${esc(r.player_name)}</span>
        <span class="dice">${r.die1} + ${r.die2} &nbsp;·&nbsp; ${time}</span>
        <span class="tot">${r.die1 + r.die2}</span>
      </div>`;
    }).join('');
  }

  async function fetchLatest() {
    const res  = await fetch(`/api/dice/latest?since_id=${lastRollId}`);
    const data = await res.json();
    if (data.new_roll && data.latest) applyRoll(data.latest);
    else if (data.latest && lastRollId === 0) applyRoll(data.latest);
    if (data.history) renderHistory(data.history);
  }

  function startPolling() {
    clearInterval(pollTimer);
    pollTimer = setInterval(fetchLatest, 2000);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('dice_player_name');
    if (saved) document.getElementById('name-input').value = saved;
    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveName();
    });
  });
</script>
</body>
</html>
