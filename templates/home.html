<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miranda Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #f0f0f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 48px 16px;
    }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: .9rem; margin-bottom: 48px; }
    .games { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
    .game-card {
      background: #16213e; border-radius: 16px; padding: 24px 20px;
      display: flex; align-items: center; gap: 18px;
      text-decoration: none; color: inherit;
      transition: background .15s, transform .1s;
    }
    .game-card:hover { background: #0f3460; transform: translateY(-2px); }
    .game-icon { font-size: 2.4rem; }
    .game-info h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .game-info p  { font-size: .82rem; color: #888; }
    .coming-soon { opacity: .45; pointer-events: none; }
    .badge {
      margin-left: auto; font-size: .7rem; background: #e94560;
      color: white; padding: 3px 8px; border-radius: 20px; font-weight: 600;
    }
    .badge.soon { background: #444; }
  </style>
</head>
<body>
  <h1>🎮 Miranda Games</h1>
  <p class="subtitle">Family game night, anywhere</p>

  <div class="games">
    <a href="/dice" class="game-card">
      <div class="game-icon">🎲</div>
      <div class="game-info">
        <h2>Dice Roller</h2>
        <p>Roll two dice — everyone sees it live</p>
      </div>
      <span class="badge">Live</span>
    </a>

    <div class="game-card coming-soon">
      <div class="game-icon">🃏</div>
      <div class="game-info">
        <h2>Rummy</h2>
        <p>Coming soon</p>
      </div>
      <span class="badge soon">Soon</span>
    </div>
  </div>
</body>
</html>
